app:
  name: "Ground Station Precheck Manager"
  version: "1.0.0"

sync:
  server_ip: "192.168.1.1"
  temporarily_switch_interface_to_dhcp: true
  restore_interface_after_sync: true
  server_reachability_timeout_seconds: 10
  dhcp_wait_timeout_seconds: 30

features:
  enable_gitlab_sync: true

sources:
  gitlab:
    repositories:
      - name: "copter-configs"
        url: "http://192.168.1.1/group/copter-configs.git"
        branch: "main"
        local_path: "./data/sources/gitlab/copter-configs"

      - name: "plane-configs"
        url: "http://192.168.1.1/group/plane-configs.git"
        branch: "main"
        local_path: "./data/sources/gitlab/plane-configs"

network:
  sync_interface:
    match_by:
      adapter_name: "Ethernet"
