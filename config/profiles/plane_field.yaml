profile:
  id: "plane"
  display_name: "Plane"
  description: "Fixed-wing aircraft — ground station pre-flight configuration check."

source_repo:
  name: "plane-configs"
  url: "http://192.168.1.1/group/plane-configs.git"
  branch: "main"

windows_interfaces:
  - id: "autopilot_link"
    display_name: "Autopilot Link (Ethernet)"
    required: true
    match_by:
      adapter_name: "Ethernet 1"
    expected_ipv4:
      address: "192.168.0.100"
      prefix_length: 24

  - id: "payload_link"
    display_name: "Payload Link (Ethernet 2)"
    required: true
    match_by:
      adapter_name: "Ethernet 2"
    expected_ipv4:
      address: "192.168.2.100"
      prefix_length: 24

network_components:
  ping_timeout_seconds: 5
  components:
    - name: "Autopilot"
      ip: "192.168.0.1"
      interface: "autopilot_link"
      required: true

    - name: "GCS Video Receiver"
      ip: "192.168.0.50"
      interface: "autopilot_link"
      required: false

    - name: "Payload Computer"
      ip: "192.168.2.1"
      interface: "payload_link"
      required: true

    - name: "Camera Control Unit"
      ip: "192.168.2.10"
      interface: "payload_link"
      required: false

mission_planner:
  base_path: "%USERPROFILE%/Documents/Mission Planner"
  files:
    - id: "joystick"
      display_name: "Joystick Configuration (joystick.xml)"
      target_path: "joystick.xml"
      expected_file: "mission_planner/plane/joystick.xml"
      required: true
      type: "xml"
      checks:
        exists: true
        valid_xml: true
        sha256_match: true

    - id: "planner_config"
      display_name: "Mission Planner Settings (config.xml)"
      target_path: "config.xml"
      expected_file: "mission_planner/plane/config.xml"
      required: true
      type: "xml"
      checks:
        exists: true
        valid_xml: true
        sha256_match: true

external_files:
  - id: "joystick_fcf"
    display_name: "Joystick Controller Config (joystick.fcf)"
    target_path: "%USERPROFILE%/Desktop/joystick.fcf"
    expected_file: "external_configs/joystick/joystick.fcf"
    required: true
    checks:
      exists: true
      sha256_match: true

  - id: "camera_config"
    display_name: "Camera System Configuration"
    target_path: "C:/Arc/Camera/plane_config.json"
    expected_file: "external_configs/camera/plane/config.json"
    required: true
    checks:
      exists: true
      sha256_match: true

  - id: "telemetry_config"
    display_name: "Telemetry Link Configuration"
    target_path: "C:/Arc/Telemetry/config.ini"
    expected_file: "external_configs/telemetry/plane/config.ini"
    required: false
    checks:
      exists: true
      sha256_match: true
